<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Masuk — Propertylink</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="login-screen">
  <div class="login-card">
    <span class="stamp">ADMIN ONLY</span>
    <h1>Propertylink</h1>
    <p class="sub">Konsultan PBG &amp; SLF — masuk dengan akun admin.</p>

    <div id="errorBox" class="error-box" style="display:none"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Kata sandi</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">Masuk</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const errorBox = document.getElementById("errorBox");

  if (params.get("denied") === "1") {
    showError("Akun ini tidak memiliki akses admin.");
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }

  // Kalau sudah login sebagai admin, langsung ke dashboard
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      const { data: profile } = await supabaseClient
        .from("profiles").select("role").eq("id", session.user.id).single();
      if (profile && profile.role === "admin") {
        window.location.href = "dashboard.html";
      }
    }
  })();

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.style.display = "none";
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Memeriksa...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      showError("Email atau kata sandi salah.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Masuk";
      return;
    }

    const { data: profile, error: profErr } = await supabaseClient
      .from("profiles").select("role").eq("id", data.user.id).single();

    if (profErr || !profile || profile.role !== "admin") {
      await supabaseClient.auth.signOut();
      showError("Akun ini tidak memiliki akses admin.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Masuk";
      return;
    }

    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
